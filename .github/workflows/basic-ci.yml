name: basic-ci

# RFWhisper CI: format, lint, type-check, unit tests, and audio quality
# acceptance gates (CW transient preservation + FT8 decode non-regression + SNR
# gain + latency probe). Everything here maps to an acceptance criterion in
# ROADMAP.md (A*, B*, C*, ...). If a gate starts failing, do not disable it
# — fix the code or fix the gate in a separate, justified PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly run for longer audio-quality tests on main.
    - cron: "17 5 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  RFWHISPER_CI: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Fast lane: formatting, linting, type checking. Must stay green always.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint / Format / Types
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install -U pip wheel
          pip install -e ".[dev]" || pip install ruff==0.5.* mypy==1.10.* pytest==8.* pre-commit

      - name: Ruff format (check only)
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy (strict on new package code)
        run: |
          if [ -d rfwhisper ]; then
            mypy rfwhisper --strict --pretty --no-error-summary || mypy rfwhisper --pretty
          else
            echo "Skipping mypy: rfwhisper/ not present yet (pre-v0.1)."
          fi

      - name: Pre-commit (all files)
        if: hashFiles('.pre-commit-config.yaml') != ''
        run: |
          pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure

  # ---------------------------------------------------------------------------
  # Unit tests across a cross-platform matrix. Criterion A7 (v0.1).
  # ---------------------------------------------------------------------------
  unit:
    name: Unit (${{ matrix.os }} / py${{ matrix.python }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]
        python: ["3.10", "3.11", "3.12"]
        exclude:
          # Keep matrix small; nightly expands to 3.10 × {all OS}.
          - os: macos-13
            python: "3.10"
          - os: windows-2022
            python: "3.10"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install system audio deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 libsndfile1 libasound2-dev ffmpeg

      - name: Install system audio deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install portaudio libsndfile ffmpeg

      - name: Install (dev + audio)
        run: |
          python -m pip install -U pip wheel
          pip install -e ".[dev,audio]" || pip install \
            numpy scipy soundfile sounddevice onnxruntime pytest pytest-xdist

      - name: Unit tests
        run: pytest -q -n auto --maxfail=1 --durations=20

      - name: Upload pytest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            .pytest_cache
            junit*.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Audio quality acceptance gates. These map 1:1 to ROADMAP.md criteria.
  # Tests are expected to live under tests/audio/ and use marker --runslow.
  #
  # Non-regression gates (these MUST stay green):
  #   * cw_transient_test.py   — RMS of CW keying onset within ±1 dB of raw  (A3, C1)
  #   * ft8_regression_test.py — WSJT-X decode count denoised ≥ raw, zero false (A2, C2)
  #
  # Quality & budget gates:
  #   * snr_gain_test.py       — effective SNR gain ≥ +3 dB avg on ham mix   (A1)
  #   * noop_quality_test.py   — PESQ drop ≤ 0.3, STOI drop ≤ 0.02 on clean  (A6)
  #   * latency_probe.py       — end-to-end p99 < 100 ms on ref runner       (A4)
  #   * rtf_test.py            — RTF < 0.5 on reference CPU                  (A5)
  # ---------------------------------------------------------------------------
  audio-quality:
    name: Audio quality gates (${{ matrix.os }})
    needs: unit
    if: github.event_name == 'schedule' || contains(github.event.pull_request.changed_files, 'rfwhisper/') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 libsndfile1 ffmpeg \
            build-essential cmake

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install portaudio libsndfile ffmpeg cmake

      - name: Install (dev + audio + eval)
        run: |
          python -m pip install -U pip wheel
          pip install -e ".[dev,audio,eval]" || pip install \
            numpy scipy soundfile onnxruntime pesq pystoi pytest pytest-xdist

      - name: Fetch seed models (deterministic, SHA-pinned)
        run: |
          python -m rfwhisper.models.fetch || echo "Model fetch not implemented yet (pre-v0.1)."

      - name: Run non-regression gates
        run: |
          pytest -q tests/audio/ -k "cw_transient or ft8_regression" \
            --runslow --maxfail=1 --durations=20

      - name: Run quality gates (SNR gain, no-op, RTF, latency)
        run: |
          pytest -q tests/audio/ -k "snr_gain or noop_quality or rtf or latency_probe" \
            --runslow --maxfail=1 --durations=20

      - name: Upload before/after artifacts + reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-quality-${{ matrix.os }}
          path: |
            build/audio-reports/**
            build/spectrograms/**
            build/latency/**
            junit*.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Packaging smoke: confirm the project still builds a wheel + sdist.
  # ---------------------------------------------------------------------------
  package:
    name: Package smoke
    needs: lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build sdist + wheel
        run: |
          python -m pip install -U pip build
          python -m build

      - name: Twine check
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Gatekeeper: prevents merge if anything above failed on PRs.
  # ---------------------------------------------------------------------------
  required:
    name: Required checks
    needs: [lint, unit, package]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.unit.result }}" != "success" ] || \
             [ "${{ needs.package.result }}" != "success" ]; then
            echo "One or more required jobs failed. Blocking merge."
            exit 1
          fi
          echo "All required jobs green. 73."
